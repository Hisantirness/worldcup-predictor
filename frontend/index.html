<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Mundial 2026</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-title">⚽ Mundial 2026 — Predictor</h1>
            <div class="nav-links">
                <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
                <button class="nav-btn" data-tab="parlay">Parlay Builder</button>
                <button class="nav-btn" data-tab="safest">Picks Seguros</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section id="tab-dashboard" class="tab-content active">
            <h2>Partidos y Predicciones</h2>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Buscar equipo..." class="filter-input">
                <select id="groupFilter" class="filter-select">
                    <option value="all">Todos los grupos</option>
                    <option value="A">Grupo A</option>
                    <option value="B">Grupo B</option>
                    <option value="C">Grupo C</option>
                    <option value="D">Grupo D</option>
                    <option value="E">Grupo E</option>
                    <option value="F">Grupo F</option>
                    <option value="G">Grupo G</option>
                    <option value="H">Grupo H</option>
                </select>
            </div>
            <div id="matchesContainer" class="matches-grid">
                <div class="loading">Cargando partidos...</div>
            </div>
        </section>

        <section id="tab-parlay" class="tab-content">
            <h2>Constructor de Parlays</h2>
            <p class="section-desc">Selecciona tus picks y calcula la probabilidad combinada.</p>
            <div id="parlayBuilder">
                <div id="parlaySelections"></div>
                <button id="addSelectionBtn" class="btn-secondary">+ Agregar selección</button>
                <div id="parlayResult" class="result-card" style="display:none;">
                    <h3>Resultado del Parlay</h3>
                    <div id="parlayResultContent"></div>
                </div>
            </div>
        </section>

        <section id="tab-safest" class="tab-content">
            <h2>Picks Más Seguros</h2>
            <p class="section-desc">Combinaciones recomendadas con mayor probabilidad de acierto.</p>
            <div id="safestContainer">
                <div class="loading">Calculando picks seguros...</div>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
